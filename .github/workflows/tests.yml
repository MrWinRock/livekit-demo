name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: UV_GIT_LFS=1 uv sync --dev

    # Run only offline unit tests in CI. The LLM-judge tests in test_agent.py
    # are excluded because they require LiveKit/inference secrets and cost
    # credits per run — those should be run locally before pushing.
    - name: Run offline tests
      run: uv run pytest tests/test_products_db.py tests/test_web_search.py -v
